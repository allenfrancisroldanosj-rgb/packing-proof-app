name: packing_proof_app
description: Android-first local video proof recording application for eCommerce warehouses.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  
  # Local Database
  sqflite: ^2.3.0
  path: ^1.8.3
  
  # Barcode Scanner & Camera
  mobile_scanner: ^3.5.2
  camera: ^0.10.5+9
  
  # File Management & Media
  intl: ^0.19.0
  path_provider: ^2.1.1
  permission_handler: ^11.1.0
  
  # Video Compression
  flutter_video_compress: ^1.5.0
  
  # Media Player (for reviewing recorded proof)
  video_player: ^2.8.2
  
  # UI Elements (for clean modern look and toasts)
  google_fonts: ^6.1.0
  flutter_spinkit: ^5.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

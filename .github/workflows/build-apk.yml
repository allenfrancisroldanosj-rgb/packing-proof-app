name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Allows you to run this build manually from the Actions tab!

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download your files from GitHub
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Java (required for Android packaging)
      - name: Set up Java Development Kit (JDK)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # Step 3: Set up Flutter
      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # Step 4: The MAGIC Step (Creates Android files if missing)
      - name: Auto-generate Android template files if missing
        run: |
          if [ ! -d "android" ]; then
            echo "⚠️ Android directory is missing! Auto-generating platform files..."
            flutter create --platforms=android .
          fi

      # Step 5: Get your Flutter package dependencies
      - name: Install dependencies
        run: flutter pub get

      # Step 6: Build the APK
      - name: Build Android Release APK
        run: flutter build apk --release

      # Step 7: Save and download your completed APK file!
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

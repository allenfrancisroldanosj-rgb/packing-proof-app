name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download the source code from your repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Set up Java 17 (Required by Gradle to build modern Flutter apps)
      - name: Set up Java Development Kit (JDK 17)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Step 3: Install Flutter SDK (Uses the official, updated stable Action)
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # Step 4: Download and configure all the dependencies listed in pubspec.yaml
      - name: Install Dependencies
        run: flutter pub get

      # Step 5: Compile the app into a release Android APK
      - name: Build APK Release Bundle
        run: flutter build apk --release

      # Step 6: Save the built APK to GitHub so you can easily download it
      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: packing-proof-app-apk
          path: build/app/outputs/flutter-apk/app-release.apk
